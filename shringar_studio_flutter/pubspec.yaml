name: shringar_studio
description: "Shringar Studio — India's largest offline Women's Design Library."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Data
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  http: ^1.2.1
  shared_preferences: ^2.2.3

  # Images
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  flutter_cache_manager: ^3.3.2

  # UI
  dynamic_color: ^1.7.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0

  # Features
  share_plus: ^9.0.0
  wallpaper_manager_plus: ^1.0.3
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0

  # Monetization
  google_mobile_ads: ^9.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/db/
