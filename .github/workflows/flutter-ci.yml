name: Flutter CI

on:
  push:
    branches: [main]
    paths: ["shringar_studio_flutter/**", ".github/workflows/flutter-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["shringar_studio_flutter/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: shringar_studio_flutter

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: shringar_studio_flutter/coverage/lcov.info

  build-apk:
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build release APK
        run: flutter build apk --release --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: shringar_studio_flutter/build/app/outputs/flutter-apk/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/app-v')
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - uses: softprops/action-gh-release@v2
        with:
          files: shringar_studio_flutter/build/app/outputs/flutter-apk/*.apk
